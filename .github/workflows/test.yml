name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # The windows leg is the product: one identical toolset on
        # every platform, no system binaries required.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          # external/ollama/src and external/podman/src are submodules (the
          # vendored forks); needed so the module graph resolves.
          submodules: recursive
      # coreutils resolves the sh engine via `replace mvdan.cc/sh/v3 => ../sh`.
      # Clone it next door (CI is a standalone clone, not the dhnt umbrella).
      - name: Clone sibling ../sh
        shell: bash
        run: git clone --quiet --depth 1 https://github.com/qiangli/sh.git ../sh
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Configure git identity (weave tests create real commits)
        shell: bash
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
      # The vendored external/ forks (ollama, podman) pull cgo + Apple MLX
      # (darwin-only) and are upstream's to test. Vet + test coreutils' OWN
      # packages on every platform — that pure-Go userland is the product.
      - name: Vet + test (coreutils packages; vendored external/ forks excluded)
        shell: bash
        run: |
          # Exclude the vendored external/ forks (cgo + platform backends), but
          # keep the lean pure-Go externals (the `bashy go` provisioner + the act
          # binmgr wrapper) in scope so they're vetted/built on every platform.
          base="$(go list ./... | grep -v '/external/')"
          if [ "$RUNNER_OS" = "Windows" ]; then
            # pkg/weave is unix-host agent orchestration (PTY + control sockets;
            # "weave: PTY not supported on Windows") — test it on unix only. The
            # cross-platform userland (cmds/git/tool/shell/binmgr) is the product.
            base="$(echo "$base" | grep -vE '/pkg/weave$')"
          fi
          pkgs="$base \
            github.com/qiangli/coreutils/external/gotoolchain \
            github.com/qiangli/coreutils/external/act \
            github.com/qiangli/coreutils/external/gh"
          go vet $pkgs
          go test $pkgs
