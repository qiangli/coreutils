name: ycode
kind: cli
display: ycode
cli:
  binary: ycode
  launch:
    # --print is an EXPLICIT headless flag, which is the whole point: ycode does
    # not infer print mode from "stdout is not a terminal", so a PTY (which it
    # needs in order to be steerable) cannot flip it into a REPL. claude had to
    # learn this the hard way; ycode already gets it right.
    exec: ycode prompt --model {model} --print {prompt}
    prompt_position: last
    trust_preseed: none
    # Bare `ycode` is the interactive bubbletea TUI — the same shape as codex and
    # opencode, and it reads stdin the same way, so agentpty's control socket
    # reaches it through the pty master with NO ycode change at all.
    steer_exec: ycode --model {model}
    supports_say: true
    supports_graceful_quit: true
    notes: >-
      FIRST-PARTY harness. It reaches every API-key provider (deepseek, moonshot,
      openai, anthropic, gemini, xai, dashscope) and maps each to its own env key,
      so an api-kind model needs no third-party CLI at all.

      Its startup chatter (LSP, memory consolidation, browser backend, OTel) goes
      to STDERR; the answer is on stdout, which is why the pipe path keeps them
      apart and a turn stays clean.

      It STEERS, and it always did. This entry said `supports_say: false` with a
      comment asserting the bus had to be exposed as a control socket first —
      written without ever launching `ycode` interactively and typing at it. It is
      a bubbletea TUI reading stdin; the pty control channel reaches it exactly as
      it reaches codex and opencode. Measured in pkg/agentpty/steer_live_test.go
      (STEER_TOOL=ycode): STEERED_OK, echoed AND answered.

      That was the sixth registry claim in one day that described a tool nobody had
      tried. The bus is still worth exposing — for a real TURN BOUNDARY and for
      evidence by construction — but not for this.
    watchdog:
      max_runtime: 45m
      mem_limit: 12g
quirks: first-party; reaches every api-key provider incl. moonshot (which opencode cannot)
harness:
  operability: 0.9
  shell: 0.95
  tool-use: 0.9
  isolation: 0.85
