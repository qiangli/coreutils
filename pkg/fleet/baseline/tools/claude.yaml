name: claude
kind: cli
display: Claude Code
cli:
  binary: claude
  launch:
    # -p is print mode, and it must be EXPLICIT. Without it claude infers
    # headlessness from "stdout is not a terminal" — which holds on a pipe and
    # is false the moment the agent is given a PTY (to clear its trust prompt,
    # or to be steered mid-run). It then opens its REPL and waits forever, and
    # the captured "answer" is a TUI banner. Every other tool in the fleet
    # already says so out loud (codex `exec`, opencode `run`, aider --message,
    # agy -p); claude was the only one relying on the guess.
    exec: claude --dangerously-skip-permissions --model {model} -p {prompt}
    prompt_position: last
    trust_preseed: .claude.json
    trust_clear: "say:1"
    supports_say: true
    supports_graceful_quit: true
    notes: TUI is steerable; a per-directory trust prompt needs a `say` of "1" (or a pre-seeded .claude.json).
    watchdog:
      max_runtime: 45m
      mem_limit: 12g
    env_markers:
      - CLAUDECODE
      - CLAUDE_CODE_ENTRYPOINT
quirks: strongest deep / multi-file work; watch for API-timeout stalls on the hardest issue
harness:
  operability: 0.95
  shell: 0.95
  tool-use: 0.9
  isolation: 0.8
