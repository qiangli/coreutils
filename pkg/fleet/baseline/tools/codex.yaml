name: codex
kind: cli
display: Codex
cli:
  binary: codex
  launch:
    exec: codex exec --skip-git-repo-check --sandbox workspace-write --model {model} {prompt}
    steer_exec: codex --model {model}
    prompt_position: last
    trust_preseed: none

    # supports_say: MEASURED, not asserted. Proven with agentpty.Run + BrokerSay —
    # the production path `meet say` uses — in pkg/agentpty/steer_live_test.go.
    # It was `false` here for months because nobody ever tried, and because the
    # control channel sent `text + \r` in ONE write, which a TUI in bracketed-paste
    # mode reads as a PASTE: the steer landed in the input box and was never
    # submitted. Two writes (text, pause, Enter) and it submits.
    supports_say: true
    supports_graceful_quit: true
    notes: >-
      headless `exec`; the sandbox flag is `-s/--sandbox workspace-write` (codex 0.141.0 —
      NOT `--workspace`, which errors 'unexpected argument' and exits 2). --full-auto is
      deprecated. Not steerable.
    watchdog:
      max_runtime: 45m
      mem_limit: 12g
    env_markers:
      - CODEX_SANDBOX
      - CODEX_THREAD_ID
quirks: reliable + honest no-ops; clean headless exec; can be plausibly-wrong — gate it
harness:
  operability: 0.7
  shell: 0.65
  tool-use: 0.85
  isolation: 0.8
