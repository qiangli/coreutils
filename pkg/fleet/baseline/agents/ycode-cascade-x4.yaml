agents:
  - name: ycode-cascade-x4
    tool: ycode
    # Nominal binding (= the base's model) so the catalog resolves it like any
    # agent; the cascade behavior is driven by base + escalation below.
    model: glm-5.2
    display: "cascade · glm-5.2 → terra → sol (serves L4)"
    # A composite that SERVES at L4 by escalation, rendered X4 — cheap glm-5.2
    # does the work and calls in progressively senior help only when stuck.
    band: 4
    band_source: cascade
    base: ycode-glm-5.2
    escalation:
      - ycode-gpt5.6-terra   # L3 help — first rung when the reflex steer fails
      - ycode-gpt5.6-sol     # L4 help — last rung
    ledger:
      reliability: unmeasured
      notes: |
        X4 cascade. Base glm-5.2 (L2) runs the task; when the coach's LLM-free
        reflex fails to break a loop, it escalates one rung — terra (L3) then sol
        (L4) — for a content-full steer. Cost-optimal L4: premium inference only
        when the cheap base has demonstrably stalled. Cross-provider (glm
        subscription + OpenAI api key). Serves L4; runs cheap.
