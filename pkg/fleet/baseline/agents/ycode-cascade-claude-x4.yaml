agents:
  - name: ycode-cascade-claude-x4
    tool: ycode
    model: sonnet5
    display: "cascade · sonnet5 → opus4.8 → fable5 (serves L4)"
    band: 4
    band_source: cascade
    base: ycode-sonnet5
    escalation:
      - ycode-opus4.8   # L3 help
      - ycode-fable5    # L4 help
    ledger:
      reliability: unmeasured
      notes: |
        X4 cascade, Anthropic lane. Base sonnet5 (L2); escalates opus4.8 (L3) then
        fable5 (L4) when stuck. Cost-optimal L4 on the claude subscription — premium
        only when the cheap base stalls. Analog of ycode-cascade-x4 (glm→terra→sol).
